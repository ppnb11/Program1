{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">📤 上传头像</h2>
    <p class="card-desc">选择一个图片文件上传作为您的头像。</p>

    <form method="POST" action="/upload" enctype="multipart/form-data" class="upload-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="upload-group">
            <label for="file" class="upload-label">选择文件：</label>
            <input type="file" id="file" name="file" class="file-input" required>
        </div>

        <button type="submit" class="btn btn-primary">上传</button>
    </form>

    {% if error %}
        <div class="upload-error">
            <p style="color: #d32f2f; margin-top: 16px;">{{ error }}</p>
        </div>
    {% endif %}

    {% if success and file_url %}
        <div class="upload-success" style="margin-top: 24px; padding: 16px; background: #f5f5f5; border-radius: 8px; text-align: center;">
            <p style="color: #2e7d32; font-weight: bold; margin-bottom: 12px;">✅ 上传成功！</p>
            <img src="{{ file_url }}" alt="头像预览" style="max-width: 200px; max-height: 200px; border-radius: 8px; border: 2px solid #ddd; margin-bottom: 12px;">
            <p style="word-break: break-all; font-size: 13px; color: #555;">
                文件链接：<a href="{{ file_url }}" target="_blank">{{ file_url }}</a>
            </p>
            <p style="font-size: 12px; color: #999;">文件名：{{ filename }}</p>
        </div>
    {% endif %}

    <div style="margin-top: 24px; text-align: center;">
        <a href="/" class="btn btn-secondary">返回首页</a>
    </div>
</div>
{% endblock %}
