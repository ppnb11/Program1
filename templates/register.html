{% extends "base.html" %}
{% block content %}
<div class="card login-card">
    <h2 class="card-title">用户注册</h2>
    {% if message %}
        <div class="error-msg">{{ message }}</div>
    {% endif %}
    <form method="POST" action="/register" class="login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone" placeholder="请输入手机号">
        </div>
        <button type="submit" class="btn btn-primary">注 册</button>
    </form>
    <p style="text-align:center; margin-top:16px; font-size:13px; color:#999;">
        已有账号？<a href="/login" style="color:#ff7e5f;">去登录</a>
    </p>
</div>
{% endblock %}
